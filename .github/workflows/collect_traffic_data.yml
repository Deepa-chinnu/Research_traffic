name: Collect Traffic Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Prevent concurrent runs from conflicting
concurrency:
  group: traffic-data-collection
  cancel-in-progress: false

env:
  TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Create data directory
        run: mkdir -p RAC4_Revised/Realtime_Data_Collection/data

      - name: Run data collector
        working-directory: RAC4_Revised/Realtime_Data_Collection
        run: python realtime_data_collector.py

      - name: Run daily preprocessor
        working-directory: RAC4_Revised/Realtime_Data_Collection
        run: python preprocess_realtime_data.py
        continue-on-error: true

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RAC4_Revised/Realtime_Data_Collection/data/ || true
          git diff --staged --quiet || git commit -m "Auto-collect traffic data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push origin main
