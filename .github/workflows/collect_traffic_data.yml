name: Collect Traffic Data

on:
  schedule:
    # Run every 15 minutes, 24/7
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

env:
  TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run data collector
        working-directory: RAC4_Revised/Realtime_Data_Collection
        run: python realtime_data_collector.py

      - name: Run daily preprocessor
        working-directory: RAC4_Revised/Realtime_Data_Collection
        run: python preprocess_realtime_data.py
        continue-on-error: true

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add RAC4_Revised/Realtime_Data_Collection/data/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Auto-collect traffic data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
